<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Success Meet</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</head>

<body>

<h2>🎓 Student Success Meet 2026-27</h2>

<form id="myForm">

<input type="text" id="name" placeholder="Student Name" required><br><br>
<input type="number" id="mobile" placeholder="Mobile"><br><br>

<button type="button" onclick="payNow()">💳 Pay & Register</button>

</form>

<script>

// 👉 Test Key (use करो)
const key = "rzp_test_SZ6vjdtQgSpPh8";

// 👉 Google Sheet URL
const scriptURL = "https://script.google.com/macros/s/AKfycbx3G504bcowfB-xlFziq1IP9bNixPl-SFGy1QLVG4EfI1P3qaOZCbgBIUkSLoZEna9Q6g/exec";

function payNow(){

    var options = {
        "key": key,
        "amount": 2100,
        "currency": "INR",
        "name": "Student Success Meet",

        handler: function (response){
            submitForm(response.razorpay_payment_id);
        }
    };

    var rzp = new Razorpay(options);
    rzp.open();
}

function submitForm(paymentId){

    const data = {
        name: document.getElementById("name").value,
        mobile: document.getElementById("mobile").value,
        paymentId: paymentId
    };

    fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify(data)
    }).then(()=>{
        alert("Registration Successful ✅");
    });

}

</script>

</body>
</html>
