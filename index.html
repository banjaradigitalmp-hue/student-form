<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Success Meet 2026-27</title>

<style>
body { font-family: Arial; background:#f4f7fb; margin:0; }

.container {
    max-width:600px;
    margin:auto;
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
}

label { font-weight:bold; display:block; margin-top:10px; }

input, select, textarea {
    width:100%;
    padding:10px;
    margin-top:5px;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    font-size:16px;
}

.payBtn { background:green; color:white; }
.submitBtn { background:#0a58ca; color:white; display:none; }

.success { color:green; text-align:center; font-weight:bold; }

</style>
</head>

<body>

<div class="container">

<h2>🎓 Student Success Meet 2026-27</h2>

<form id="myForm">

<label>Student Name</label>
<input type="text" required>

<label>Date of Birth</label>
<input type="date">

<label>Mobile</label>
<input type="number">

<label>School</label>
<input type="text">

<label>Stream</label>
<select>
<option>Science</option>
<option>Commerce</option>
<option>Arts</option>
</select>

<label>Future College</label>
<input type="text">

<label>Career Goal</label>
<textarea></textarea>

<label>Travel Mode</label>
<select>
<option>Self</option>
<option>College Bus</option>
<option>Public Transport</option>
</select>

<label>Scholarship</label>
<select>
<option>Yes</option>
<option>No</option>
</select>

<label>Health Card</label>
<select>
<option>Yes</option>
<option>No</option>
</select>

<label>Family Contact 1</label>
<input type="number">

<label>Family Contact 2</label>
<input type="number">

<!-- PAYMENT -->
<button type="button" class="payBtn" onclick="payNow()">💳 Pay Now</button>

<p id="msg" class="success"></p>

<label>Enter Payment Transaction ID</label>
<input type="text" id="txn" placeholder="Payment ID">

<button type="button" onclick="verifyPayment()">Verify Payment</button>

<!-- SUBMIT -->
<button type="submit" class="submitBtn" id="submitBtn">Submit Form</button>

</form>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbx3G504bcowfB-xlFziq1IP9bNixPl-SFGy1QLVG4EfI1P3qaOZCbgBIUkSLoZEna9Q6g/exec";

// 👉 अपना Razorpay Payment Link
const paymentLink = "https://rzp.io/rzp/Nvztla3";

function payNow() {
    window.open(paymentLink, "_blank");
}

// Basic verification
function verifyPayment() {
    let txn = document.getElementById("txn").value;

    if(txn.length > 5){
        document.getElementById("msg").innerText = "Payment Verified ✅";
        document.getElementById("submitBtn").style.display = "block";
    } else {
        alert("Invalid Payment ID ❌");
    }
}

// Submit
document.getElementById("myForm").addEventListener("submit", function(e){
    e.preventDefault();

    const data = {
        name: document.querySelectorAll('input')[0].value,
        dob: document.querySelectorAll('input')[1].value,
        mobile: document.querySelectorAll('input')[2].value,
        school: document.querySelectorAll('input')[3].value,
        stream: document.querySelectorAll('select')[0].value,
        college: document.querySelectorAll('input')[4].value,
        career: document.querySelector('textarea').value,
        travel: document.querySelectorAll('select')[1].value,
        scholarship: document.querySelectorAll('select')[2].value,
        health: document.querySelectorAll('select')[3].value,
        contact1: document.querySelectorAll('input')[5].value,
        contact2: document.querySelectorAll('input')[6].value,
        paymentId: document.getElementById("txn").value
    };

    fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(() => {
        alert("Form Submitted Successfully ✅");
        document.getElementById("myForm").reset();
        document.getElementById("submitBtn").style.display = "none";
        document.getElementById("msg").innerText = "";
    });

});

</script>

</body>
</html>
